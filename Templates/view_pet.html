{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h3 class="mb-4 text-center">My Added Pets</h3>

    <div class="row">

        {% for p in pet %}

        <div class="col-md-4 mb-3">

            <div class="card shadow">

                <img src="{{ p.pet_img.url }}" class="card-img-top" style="height:200px; object-fit:cover;">

                <div class="card-body">

                    <h5>{{ p.pet_name }}</h5>

                    <p>{{ p.pet_location }}</p>

                    <!-- VIEW -->
                    <a href="{% url 'petoperation:allpets_view'  %}" class="btn btn-primary btn-sm">
                        View
                    </a>

                    <!-- EDIT -->
                    <a href="{% url 'petoperation:update_petdetails' p.id %}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <!-- DELETE -->
                    <a href="{% url 'petoperation:delete_pet' p.id %}" class="btn btn-danger btn-sm">
                        Delete
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <p class="text-center">No pets added yet.</p>

        {% endfor %}

    </div>

</div>

{% endblock %}
