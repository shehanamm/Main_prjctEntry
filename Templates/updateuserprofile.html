
{% load static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<!-- <link rel="stylesheet" href="{% static 'css/userprofile.css' %}"> -->

<div class="profile-container mt-5">
    <div class="card profile-card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body p-5">
            <h2 class="card-title text-center mb-5"> User Profile</h2>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <!-- Name row -->
                   <div class="row mb-4 align-items-center">
                    <label for="id_address" class="col-sm-4 col-form-label fw-bold">Name</label>
                    <div class="col-sm-8">
                        {{ form.name }}
                    </div>
                </div>
                
                <!-- Address Row -->
                <div class="row mb-4 align-items-center">
                    <label for="id_address" class="col-sm-4 col-form-label fw-bold">Address</label>
                    <div class="col-sm-8">
                        {{ form.address }}
                    </div>
                </div>
                
                <!-- Age Row -->
                <div class="row mb-4 align-items-center">
                    <label for="id_age" class="col-sm-4 col-form-label fw-bold">Age</label>
                    <div class="col-sm-8">
                        {{ form.age }}
                    </div>
                </div>
                
                <!-- City Row -->
                <div class="row mb-4 align-items-center">
                    <label for="id_city" class="col-sm-4 col-form-label fw-bold">City</label>
                    <div class="col-sm-8">
                        {{ form.city }}
                    </div>
                </div>
                
                <!-- Phone Row -->
                <div class="row mb-4 align-items-center">
                    <label for="id_phone" class="col-sm-4 col-form-label fw-bold">Phone</label>
                    <div class="col-sm-8">
                        {{ form.phone }}
                    </div>
                </div>
                
                <!-- Profile Picture Row -->
                <div class="row mb-4">
                    <label for="id_profile_pic" class="col-sm-4 col-form-label fw-bold">Profile Picture</label>
                    <div class="col-sm-8">
                        {{ form.profile_pic }}
                        <!-- {% if user.userprofile.profile_pic %}
                            <div class="mt-3">
                                <img src="{{ user.userprofile.profile_pic.url }}" alt="Profile Picture" class="img-thumbnail rounded shadow-sm" width="120">
                            </div>
                        {% endif %} -->
                    </div>
                </div>

                <!-- Submit Button Row -->
                <div class="row mt-5">
                    <div class="col-sm-8 offset-sm-4">
                        <button type="submit" class="btn btn-secondary w-100 fw-bold py-2">EDIT</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
