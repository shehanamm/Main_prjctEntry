{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>System Rating</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f6fa;
        }

        .rating-box {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="rating-box">

        <h3 class="title">⭐ Rate Our System</h3>

        <p class="text-center text-muted">
            Give feedback about your experience
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Rating (1 - 5)</label>
                {{ form.rating }}
            </div>

            <div class="mb-3">
                <label>Review</label>
                {{ form.review }}
            </div>

            <button class="btn btn-primary w-100">
                Submit Rating
            </button>

        </form>

    </div>

</div>

</body>
</html>
