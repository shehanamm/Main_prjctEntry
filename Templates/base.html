{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Petfinder{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">

    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{% static 'img/pawlogo.jpg' %}" alt="Petfinder"
                 style="height:40px" class="me-2">
            <span>Petfinder</span>
        </a>

        <!-- Toggle button -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- NAVBAR CONTENT -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                       href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'petoperation:allpets_view' %}">
                        Select your Pet
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'petoperation:addpet' %}">
                        Donate
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'allhome' %}">
                        Pet Shop
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'user_cart' %}">
                        Cart
                    </a>
                </li>

            </ul>

            <!-- RIGHT BUTTONS
            <div class="d-flex align-items-center gap-2">

                <a href="{% url 'staff_register' %}" class="btn btn-outline-primary btn-sm">
                    Staff
                </a>

                <a href="{% url 'user_register' %}" class="btn btn-outline-primary btn-sm">
                    Customer
                </a>

                <a href="{% url 'donor_register' %}" class="btn btn-outline-primary btn-sm">
                    Donor
                </a> -->

                <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
                    Sign in
                </a>
             
            </div>

        </div>
    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-3">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
