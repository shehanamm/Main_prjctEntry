{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <!-- Card Wrapper -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-danger text-white p-3 d-flex align-items-center">
                    <i class="bi bi-megaphone-fill fs-4 me-2"></i>
                    <h4 class="card-title mb-0 fw-bold">Post Emergency Alert</h4>
                </div>
                
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        <!-- Loop through fields to apply precise Bootstrap spacing -->
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label fw-semibold text-secondary">
                                    {{ field.label }}
                                </label>
                                {{ field }}
                                {% if field.help_text %}
                                    <div class="form-text text-muted">{{ field.help_text }}</div>
                                {% endif %}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors|striptags }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        
                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-danger btn-lg shadow-sm">
                                <i class="bi bi-send-fill me-2"></i>Publish Broadcast
                            </button>
                            <!-- <a href="{% url 'home' %}" class="btn btn-light text-secondary border">
                                Cancel -->
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
